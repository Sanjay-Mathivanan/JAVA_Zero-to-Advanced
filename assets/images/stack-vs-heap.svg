<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 360" width="100%">
  <style>
    .bg { fill: #f8f9fa; }
    .label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 14px; }
    .desc { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 11px; }
    
    .stack-box { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2.5; rx: 12; }
    .stack-text { fill: #2b6cb0; }
    
    .heap-box { fill: #fffaf0; stroke: #dd6b20; stroke-width: 2.5; rx: 12; }
    .heap-text { fill: #9c4221; }
    
    .sub-box { fill: #ffffff; stroke: #cbd5e0; stroke-width: 1.5; rx: 6; }
    .sub-text { fill: #2d3748; }
    
    .arrow { stroke: #e53e3e; stroke-width: 2; fill: none; stroke-dasharray: 4 4; }
    .arrow-head { fill: #e53e3e; }
    
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .stack-box { fill: #1A365D; stroke: #4299e1; }
      .stack-text { fill: #90cdf4; }
      
      .heap-box { fill: #5c3e21; stroke: #ed8936; }
      .heap-text { fill: #fbd38d; }
      
      .sub-box { fill: #1a202c; stroke: #4a5568; }
      .sub-text { fill: #e2e8f0; }
      
      .arrow { stroke: #f56565; }
      .arrow-head { fill: #f56565; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="16" />

  <!-- Stack Area (LIFO) -->
  <g transform="translate(30, 30)">
    <rect class="stack-box" width="250" height="300" />
    <text class="label stack-text" x="20" y="28">Stack Memory</text>
    <text class="desc stack-text" x="20" y="45">Fast access, stores primitive variables and reference variables</text>

    <!-- Stack Frame for main() -->
    <g transform="translate(15, 65)">
      <rect class="sub-box" width="220" height="215" />
      <text class="label sub-text" x="15" y="25">main() Frame</text>
      
      <!-- Variables -->
      <g transform="translate(15, 45)">
        <!-- Primitive int x = 10 -->
        <rect class="sub-box" width="190" height="40" />
        <text class="desc sub-text" x="10" y="24">int x = 10 (Value Type)</text>

        <!-- Primitive double y = 5.5 -->
        <rect class="sub-box" width="190" height="40" y="50" />
        <text class="desc sub-text" x="10" y="74">double y = 5.5 (Value Type)</text>

        <!-- Reference String str = "Hello" -->
        <rect class="sub-box" width="190" height="40" y="100" />
        <text id="ref-point-str" class="desc sub-text" x="10" y="124">String str = [0x7a4b] (Ref)</text>
      </g>
    </g>
  </g>

  <!-- Heap Area -->
  <g transform="translate(370, 30)">
    <rect class="heap-box" width="250" height="300" />
    <text class="label heap-text" x="20" y="28">Heap Memory</text>
    <text class="desc heap-text" x="20" y="45">Dynamic size, stores actual objects and instance variables</text>

    <!-- Object in Heap -->
    <g transform="translate(25, 120)">
      <rect class="sub-box" width="200" height="100" />
      <text class="label sub-text" x="15" y="25">String Object</text>
      <text class="desc sub-text" x="15" y="50">Address: 0x7a4b</text>
      <text class="desc sub-text" x="15" y="75">Value: "Hello"</text>
    </g>
  </g>

  <!-- Pointer Arrow from Stack to Heap -->
  <g>
    <path class="arrow" d="M 215 195 C 290 195, 300 170, 385 170" />
    <polygon class="arrow-head" points="385,166 393,170 385,174" />
  </g>
</svg>
