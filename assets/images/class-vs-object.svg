<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 360" width="100%">
  <style>
    .bg { fill: #f8f9fa; }
    .label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 14px; }
    .desc { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 11px; }
    
    .class-box { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2.5; rx: 12; }
    .class-text { fill: #2b6cb0; }
    
    .object-box { fill: #fffaf0; stroke: #dd6b20; stroke-width: 2.5; rx: 12; }
    .object-text { fill: #9c4221; }
    
    .sub-box { fill: #ffffff; stroke: #cbd5e0; stroke-width: 1.5; rx: 6; }
    .sub-text { fill: #2d3748; }
    
    .arrow { stroke: #3182ce; stroke-width: 2; fill: none; }
    .arrow-head { fill: #3182ce; }
    
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .class-box { fill: #1A365D; stroke: #4299e1; }
      .class-text { fill: #90cdf4; }
      
      .object-box { fill: #5c3e21; stroke: #ed8936; }
      .object-text { fill: #fbd38d; }
      
      .sub-box { fill: #1a202c; stroke: #4a5568; }
      .sub-text { fill: #e2e8f0; }
      
      .arrow { stroke: #4299e1; }
      .arrow-head { fill: #4299e1; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="16" />

  <!-- Class Blueprint (Left Side) -->
  <g transform="translate(30, 30)">
    <rect class="class-box" width="220" height="300" />
    <text class="label class-text" x="20" y="28">Class (Blueprint)</text>
    <text class="desc class-text" x="20" y="45">Defines properties &amp; behavior template</text>

    <!-- Blueprint Design -->
    <g transform="translate(15, 65)">
      <rect class="sub-box" width="190" height="215" />
      <text class="label sub-text" x="15" y="25">class Student</text>
      
      <!-- Template Properties -->
      <g transform="translate(15, 45)">
        <rect class="sub-box" width="160" height="35" />
        <text class="desc sub-text" x="10" y="22">String name;</text>

        <rect class="sub-box" width="160" height="35" y="45" />
        <text class="desc sub-text" x="10" y="67">int age;</text>

        <!-- Template Behaviors -->
        <rect class="sub-box" width="160" height="60" y="90" />
        <text class="desc sub-text" x="10" y="108">void study() {</text>
        <text class="desc sub-text" x="15" y="123">// study logic</text>
        <text class="desc sub-text" x="10" y="138">}</text>
      </g>
    </g>
  </g>

  <!-- Instantiation arrows -->
  <g>
    <!-- Arrow to Object 1 -->
    <path class="arrow" d="M 250 130 C 290 130, 290 90, 370 90" />
    <polygon class="arrow-head" points="370,86 378,90 370,94" />
    <text class="desc class-text" x="260" y="95">new Student()</text>
    
    <!-- Arrow to Object 2 -->
    <path class="arrow" d="M 250 230 C 290 230, 290 270, 370 270" />
    <polygon class="arrow-head" points="370,266 378,270 370,274" />
    <text class="desc class-text" x="260" y="255">new Student()</text>
  </g>

  <!-- Objects Instances (Right Side) -->
  <g transform="translate(380, 30)">
    <!-- Object 1 -->
    <g transform="translate(0, 0)">
      <rect class="object-box" width="240" height="135" />
      <text class="label object-text" x="20" y="25">Object 1 (Instance of Student)</text>
      <text class="desc object-text" x="20" y="40">Has unique state / space in Heap</text>
      
      <g transform="translate(15, 55)">
        <rect class="sub-box" width="210" height="65" />
        <text class="desc sub-text" x="15" y="22">name = &quot;Sanjay&quot;</text>
        <text class="desc sub-text" x="15" y="45">age = 21</text>
      </g>
    </g>

    <!-- Object 2 -->
    <g transform="translate(0, 165)">
      <rect class="object-box" width="240" height="135" />
      <text class="label object-text" x="20" y="25">Object 2 (Instance of Student)</text>
      <text class="desc object-text" x="20" y="40">Has unique state / space in Heap</text>
      
      <g transform="translate(15, 55)">
        <rect class="sub-box" width="210" height="65" />
        <text class="desc sub-text" x="15" y="22">name = &quot;Rahul&quot;</text>
        <text class="desc sub-text" x="15" y="45">age = 22</text>
      </g>
    </g>
  </g>
</svg>
