<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 300" width="100%">
  <style>
    .bg { fill: #f8f9fa; }
    .label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 14px; }
    .desc { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 11px; }
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #1a202c; }
    
    .box-comp { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2; rx: 8; }
    .text-comp { fill: #2b6cb0; }
    
    .box-inh { fill: #fffaf0; stroke: #dd6b20; stroke-width: 2; rx: 8; }
    .text-inh { fill: #9c4221; }
    
    .inner-box { fill: #ffffff; stroke: #cbd5e0; stroke-width: 1.5; rx: 6; }
    .inner-text { fill: #4a5568; }
    
    .arrow { stroke: #4a5568; stroke-width: 2; fill: none; }
    .arrow-dashed { stroke: #4a5568; stroke-width: 2; fill: none; stroke-dasharray: 4 4; }
    .arrow-head { fill: #4a5568; }
    
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .title { fill: #f7fafc; }
      .box-comp { fill: #1A365D; stroke: #4299e1; }
      .text-comp { fill: #90cdf4; }
      .box-inh { fill: #5c3e21; stroke: #ed8936; }
      .text-inh { fill: #fbd38d; }
      .inner-box { fill: #1a202c; stroke: #4a5568; }
      .inner-text { fill: #e2e8f0; }
      .arrow { stroke: #a0aec0; }
      .arrow-dashed { stroke: #a0aec0; }
      .arrow-head { fill: #a0aec0; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="16" />

  <!-- Left Side: Composition (HAS-A) -->
  <g transform="translate(40, 30)">
    <text class="title" x="0" y="20">Composition (HAS-A)</text>
    <text class="desc inner-text" x="0" y="38">One class contains an instance of another class</text>
    
    <!-- Car Class -->
    <g transform="translate(0, 60)">
      <rect class="box-comp" width="220" height="150" />
      <text class="label text-comp" x="15" y="25">class Car</text>
      
      <!-- Inner Engine Reference -->
      <g transform="translate(15, 45)">
        <rect class="inner-box" width="190" height="85" />
        <text class="label inner-text" x="12" y="22">- Engine engine</text>
        <text class="desc inner-text" x="12" y="42">// Reference variable points</text>
        <text class="desc inner-text" x="12" y="58">// to separate Engine object</text>
      </g>
    </g>

    <!-- Engine Class (Separate) -->
    <g transform="translate(10, 230)">
      <rect class="inner-box" width="200" height="30" />
      <text class="label inner-text" x="15" y="20">class Engine { ... }</text>
    </g>

    <!-- Pointer Arrow pointing down -->
    <g>
      <path class="arrow-dashed" d="M 110 190 L 110 220" />
      <polygon class="arrow-head" points="106,220 110,228 114,220" />
    </g>
  </g>

  <!-- Divider Line -->
  <line x1="325" y1="30" x2="325" y2="270" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="6 6" />

  <!-- Right Side: Inheritance (IS-A) -->
  <g transform="translate(360, 30)">
    <text class="title" x="0" y="20">Inheritance (IS-A)</text>
    <text class="desc inner-text" x="0" y="38">Subclass extends base superclass properties</text>
    
    <!-- Base class: Vehicle -->
    <g transform="translate(20, 60)">
      <rect class="box-inh" width="210" height="55" />
      <text class="label text-inh" x="15" y="25">class Vehicle</text>
      <text class="desc text-inh" x="15" y="42">Properties: maxSpeed, fuelType</text>
    </g>
    
    <!-- Sub class: Car -->
    <g transform="translate(20, 160)">
      <rect class="box-inh" width="210" height="70" />
      <text class="label text-inh" x="15" y="25">class Car extends Vehicle</text>
      <text class="desc text-inh" x="15" y="42">Inherits speed and fuelType</text>
      <text class="desc text-inh" x="15" y="56">Adds unique properties: numDoors</text>
    </g>

    <!-- Arrow pointing up (Subclass to Superclass) -->
    <g>
      <path class="arrow" d="M 125 160 L 125 125" />
      <polygon class="arrow-head" points="120,125 125,117 130,125" />
    </g>
  </g>
</svg>
