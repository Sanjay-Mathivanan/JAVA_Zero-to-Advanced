<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" width="100%">
  <style>
    .bg { fill: #f8f9fa; }
    .label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; text-anchor: middle; }
    .desc { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 11px; text-anchor: middle; fill: #4a5568; }
    .code-text { font-family: monospace; font-size: 12px; font-weight: bold; }
    
    .call-box { fill: #ebf8ff; stroke: #3182ce; stroke-width: 2; rx: 8; }
    .def-box { fill: #f0fff4; stroke: #38a169; stroke-width: 2; rx: 8; }
    
    .call-title { fill: #2b6cb0; }
    .def-title { fill: #276749; }
    
    .binding-arrow { stroke: #e53e3e; stroke-width: 2; fill: none; stroke-dasharray: 4 4; }
    .binding-arrow-head { fill: #e53e3e; }
    
    .binding-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 10px; fill: #e53e3e; text-anchor: middle; }
    
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .call-box { fill: #1A365D; stroke: #4299e1; }
      .def-box { fill: #1C4532; stroke: #48bb78; }
      
      .call-title { fill: #90cdf4; }
      .def-title { fill: #9ae6b4; }
      .desc { fill: #a0aec0; }
      
      .binding-arrow { stroke: #f56565; }
      .binding-arrow-head { fill: #f56565; }
      .binding-text { fill: #f56565; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" rx="16" />

  <!-- Title -->
  <text class="label" x="340" y="30" font-size="16" fill="#2d3748">Compile-Time Polymorphism (Static Binding)</text>

  <!-- Left: Method Invocation Calls -->
  <g transform="translate(40, 60)">
    <rect class="call-box" width="220" height="240" />
    <text class="label call-title" x="110" y="28">Method Calls</text>
    <text class="desc" x="110" y="45">(Determined by arguments)</text>
    
    <!-- Call 1 -->
    <g transform="translate(15, 65)">
      <rect fill="#ffffff" opacity="0.1" width="190" height="40" rx="4" />
      <text class="code-text call-title" x="15" y="24">add(10, 20)</text>
    </g>

    <!-- Call 2 -->
    <g transform="translate(15, 120)">
      <rect fill="#ffffff" opacity="0.1" width="190" height="40" rx="4" />
      <text class="code-text call-title" x="15" y="24">add(5.5, 4.5)</text>
    </g>

    <!-- Call 3 -->
    <g transform="translate(15, 175)">
      <rect fill="#ffffff" opacity="0.1" width="190" height="40" rx="4" />
      <text class="code-text call-title" x="15" y="24">add(1, 2, 3)</text>
    </g>
  </g>

  <!-- Right: Overloaded Method Definitions -->
  <g transform="translate(420, 60)">
    <rect class="def-box" width="220" height="240" />
    <text class="label def-title" x="110" y="28">Method Definitions</text>
    <text class="desc" x="110" y="45">(Unique Parameter Signatures)</text>
    
    <!-- Def 1 -->
    <g transform="translate(15, 65)">
      <rect fill="#ffffff" opacity="0.1" width="190" height="40" rx="4" />
      <text class="code-text def-title" x="10" y="24">add(int a, int b)</text>
    </g>

    <!-- Def 2 -->
    <g transform="translate(15, 120)">
      <rect fill="#ffffff" opacity="0.1" width="190" height="40" rx="4" />
      <text class="code-text def-title" x="10" y="24">add(double a, double b)</text>
    </g>

    <!-- Def 3 -->
    <g transform="translate(15, 175)">
      <rect fill="#ffffff" opacity="0.1" width="190" height="40" rx="4" />
      <text class="code-text def-title" x="10" y="24">add(int a, int b, int c)</text>
    </g>
  </g>

  <!-- Binding Pointers -->
  <!-- Call 1 to Def 1 -->
  <g>
    <path class="binding-arrow" d="M 260 145 L 420 145" />
    <polygon class="binding-arrow-head" points="420,141 428,145 420,149" />
    <text class="binding-text" x="340" y="138">Match: (int, int)</text>
  </g>

  <!-- Call 2 to Def 2 -->
  <g>
    <path class="binding-arrow" d="M 260 200 L 420 200" />
    <polygon class="binding-arrow-head" points="420,196 428,200 420,204" />
    <text class="binding-text" x="340" y="193">Match: (double, double)</text>
  </g>

  <!-- Call 3 to Def 3 -->
  <g>
    <path class="binding-arrow" d="M 260 255 L 420 255" />
    <polygon class="binding-arrow-head" points="420,251 428,255 420,259" />
    <text class="binding-text" x="340" y="248">Match: (int, int, int)</text>
  </g>
</svg>
