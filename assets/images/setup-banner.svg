<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%">
  <style>
    .bg { fill: url(#bg-grad); }
    .title { font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 42px; fill: #ffffff; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 16px; fill: #e2e8f0; opacity: 0.9; }
    .tag { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 11px; fill: #fbd38d; letter-spacing: 1.5px; }
    .icon-base { fill: #2d3748; opacity: 0.2; }
    .icon-glow { fill: #dd6b20; opacity: 0.8; filter: url(#glow); }
    @media (prefers-color-scheme: dark) {
      .bg { fill: url(#bg-grad-dark); }
    }
  </style>
  
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a202c" />
      <stop offset="100%" stop-color="#2d3748" />
    </linearGradient>
    <linearGradient id="bg-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <linearGradient id="cup-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ed8936" />
      <stop offset="100%" stop-color="#dd6b20" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="16" class="bg" />
  
  <!-- Decorative background elements -->
  <g transform="translate(620, 120)">
    <!-- Shield/Java Cup shape -->
    <path class="icon-base" d="M -40,-60 L 40,-60 L 50,0 C 50,40 10,70 0,80 C -10,70 -50,40 -50,0 Z" />
    <path d="M-15,30 C-25,25 -25,10 -15,5 C-5,0 15,0 20,-10 C25,-20 15,-35 0,-40 C-10,-43 -20,-35 -20,-25" fill="none" stroke="url(#cup-grad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M-10,42 C5,42 25,35 25,20 C25,5 5,0 -5,0 C-15,0 -20,-10 -20,-15" fill="none" stroke="#ed8936" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="2.5" cy="48" rx="20" ry="5" fill="#ed8936" opacity="0.3" filter="url(#glow)"/>
  </g>

  <!-- Left details -->
  <circle cx="80" cy="60" r="4" fill="#ed8936" opacity="0.6"/>
  <circle cx="120" cy="180" r="6" fill="#4a5568" opacity="0.4"/>
  <line x1="50" y1="120" x2="100" y2="120" stroke="#4a5568" stroke-dasharray="4 4" stroke-width="2" opacity="0.5"/>

  <!-- Text group -->
  <g transform="translate(60, 75)">
    <text class="tag" x="0" y="0">JAVA ZERO-TO-ADVANCED</text>
    <text class="title" x="0" y="45">01. Environment Setup</text>
    <text class="subtitle" x="0" y="75">Installing JDK, configuring Environment Variables, and running your first program.</text>
  </g>
</svg>
